[manim]
pixel_width = 1080
pixel_height = 1920
frame_width = 9
frame_height = 16
frame_rate = 60
background_color = #000000
renderer = cairo ; set to opengl for faster previews if needed

[scene]
random_seed = 8
total_time = 30.0

formula_tex = r(\theta)=a\cos\!\big(k(\theta+\phi)\big)
formula_scale = 0.88
formula_top_buff = 0.35
formula_in_time = 1.2
formula_hold_time = 0.8
show_k_label = 1
k_label_tex = k=\frac{n}{d}
k_label_scale = 0.85
k_label_buff = 0.42
k_label_in_time = 0.55

show_param_table = 1
table_in_time = 0.55
table_top_buff = 0.16
table_text_scale = 0.33
table_row_height = 0.30
table_slot_width = 0.55
table_slot_gap = 0.05
table_n_values = 1,2,3,4,5,6,7
table_d_values = 1,2,3,4,5,6,7,8,9
table_line_opacity = 0.38
table_fill_opacity = 0.05
table_slot_opacity = 0.22
table_copy_lag = 0.22
table_rose_size = 0.17
table_theta_step = 0.045

show_guide_contour = 1
guide_fade_time = 0.7
guide_hold_time = 0.2
guide_final_opacity = 0.08

eight_source = text
eight_text = 8
eight_font_candidates = Snell Roundhand, Zapfino, STIX Two Text, Times New Roman, PT Sans
eight_weight = BOLD
eight_slant = 0
eight_tex_fallback = \mathit{8}
eight_height = 6.8
eight_rotation_deg = 0.0
eight_shear = 0.0
eight_offset_x = 0.0
eight_offset_y = -0.20
eight_stroke_width = 2.0
eight_stroke_opacity = 0.22

rose_count = 63
rose_k_values = 2,3,4,5,6,7,8,9
rose_size_min = 0.14
rose_size_max = 0.24
rose_size_floor = 0.07
rose_min_gap = 0.015
rose_anchor_oversample = 24
rose_stroke_width = 2.0
rose_opacity = 0.95
rose_lag_ratio = 0.06
rose_theta_step = 0.03
anchor_start = 0.02
anchor_end = 0.98

final_fill_time = 1.0
final_fill_color = #CC1F2F
final_fill_opacity = 0.92
copy_to_heart_time = 0.9
heart_transform_time = 1.2
heart_copy_scale = 0.52
heart_offset_x = 2.15
heart_offset_y = -2.05
heart_height = 1.85
heart_stroke_width = 2.4

min_draw_time = 6.0
final_wait = 1.5

[colors]
formula_col = #FFD166
guide_col = #FFFFFF
rose_palette = #FFD6E0,#CDE7FF,#D9FBD0,#FFF1C9,#E7D7FF
