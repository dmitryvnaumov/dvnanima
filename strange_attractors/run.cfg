[manim]
pixel_width = 1080
pixel_height = 1920
frame_width = 9
frame_height = 16
frame_rate = 60
background_color = #000000
renderer = cairo ; set to opengl for faster previews if needed

[scene]
text_font = PT Sans
default_attractor = lorenz
total_time = 20.0

dt = 0.006
warmup_steps = 2500
points_per_sec = 200
tail_seconds = 12.0
target_radius = 3.1
scene_scale = 1.18
center_shift_y = -0.35

axis_min = -4
axis_max = 4
axis_step = 2
axes_length = 6.6
axis_stroke_width = 1.6
axis_stroke_opacity = 0.10

camera_phi_deg = 68
camera_theta_deg = -42
ambient_rotation_rate = 0.05

title_font_size = 84
subtitle_text = STRANGE ATTRACTOR
subtitle_font_size = 56
title_top_buff = 0.28
title_gap = 0.4
title_in_time = 0.6

show_equations = 1
equation_scale = 0.75
equation_bottom_buff = 0.55
equation_in_time = 0.6
equation_box_opacity = 0.44
equation_box_buff = 0.20

curve_stroke_width = 3.1
curve_opacity = 0.90
head_radius = 0.052
head_opacity = 1.0
path_rate_func = ease_in_out_sine
end_wait = 0.3

[colors]
text_col = #FFFFFF
subtitle_col = #C9D2DF
label_col = #FFD166
axis_col = #FFFFFF
path_col = #7AA6FF
active_path_col = #4D6BFF
head_col = #FF4D4D
equation_col = #FFFFFF
