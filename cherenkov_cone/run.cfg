[run]
save_movie = 1
movie_path = cherenkov_cylinder.mp4
n_frames = 140
show_progress = 1
movie_fps = 24
movie_format = pyav
movie_codec = libx264
movie_is_batch = 0
history_stride = 1
save_history_npz = 1
history_npz_path = cherenkov_history.npz
save_history_vtm = 1
history_vtm_path = cherenkov_history.vtm
; Open an interactive history viewer (slider + keys).
show_history_viewer = 0

[detector]
cluster_radius = 40.0
z_min = -70.0
z_max = 70.0
cylinder_resolution = 120
cyl_sample_phi = 280
n_strings = 10
oms_per_string = 20

[optics]
n_refr = 1.33
beta = 1.0

[track]
r0 = -50.0, 0.0, 0.0
u = 1, 0., 0.
s_start = 0.0
s_end = 170.0
draw_s_min = -10.0
draw_s_max = 190.0
draw_points = 300

[intersection]
analytic_eps = 1e-12
apex_inside_only = 0
nappe = trailing
clip_to_visual_cone = 1
max_forward_distance = 0
verify_geometry = 0
verify_every = 20
verify_atol = 1e-8

min_points = 5
activation_distance = 2.8
curve_line_width = 2.8
curve_color = chartreuse

[visual]
plot_theme = document
window_width = 1400
window_height = 900
show_unwrapped_view = 1

cylinder_line_width = 1.5
cylinder_opacity = 0.35
track_line_width = 4.0
om_point_size = 10.0
unwrap_om_point_size = 7.0
unwrap_curve_line_width = 1.3
unwrap_curve_point_size = 2.0
unwrap_active_om_point_size = 10.0
apex_radius = 1.8
cone_height = 45.0
cone_resolution = 80
cone_opacity = 0.18

camera_position = 30.0, -220.0, 20.0
camera_focal = 0.0, 0.0, 0.0
camera_view_up = 0.0, 0.0, 1.0
parallel_projection = 0

movie_camera_position = 10.0, -220.0, 20.0
movie_camera_focal = 0.0, 0.0, 0.0
movie_camera_view_up = 0.0, 0.5, 0.5
movie_parallel_projection = 0
title_text = Cherenkov cone-cylinder intersection prototype
