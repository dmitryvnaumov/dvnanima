[manim]
pixel_width = 1080
pixel_height = 1920
frame_width = 9
frame_height = 16
frame_rate = 60
background_color = #000000
renderer = cairo ; set to opengl for faster previews if your OpenGL works

[scene]
title_scale = 2.00
title_shift_down = 0.55
heart_formula_scale = 18.0
nu_stroke = 18.0
nu_height = 8.5
nu_y = 0.2
heart_stroke = 24.0
heart_height = 8.0
glow_width = 24.0
glow_opacity = 0.10
morph_points = 1000
create_time = 2.8
pre_morph_wait = 1.2
morph_time = 4.5
post_wait = 3.5
hold_pulses = 2.8
pulse_width_boost = 0.95
pulse_opacity_boost = 2.80
heart_pulse_width_boost = 0.24
heart_pulse_color_mix = 0.45

[colors]
col_text = #FFD166
col_nu = #7AA6FF
col_heart = #FF4D4D
